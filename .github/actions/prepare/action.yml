name: 'Prepare ACS Build'
description: 'Prepare AMRC Connectivity Stack build steps'
inputs:
  service-name:
    description: 'The name of the service (e.g. acs-auth)'
    required: true
  token:
    description: 'The secrets.GITHUB_TOKEN to use for Docker login. Must be passed as input because composite actions cannot access secrets.'
    required: true
outputs:
  service-name:
    value: ${{ inputs.service-name }}
  version:
    value: ${{ steps.meta.outputs.version }}
  labels:
    value: ${{ steps.meta.outputs.labels }}
runs:
  using: "composite"
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.3.0
    - name: Setup build
      uses: docker/setup-buildx-action@v3
    - name: Login to registry
      # docker/login-action has no built-in retry (upstream feature
      # request docker/login-action#750 is still open) and ghcr.io's
      # token endpoint flakes often enough that a single timeout costs
      # us a build. Roll our own retry loop with linear backoff.
      # --password-stdin keeps the token out of `ps` and the shell
      # history.
      shell: bash
      env:
        DOCKER_TOKEN: ${{ inputs.token }}
        DOCKER_USER: ${{ github.actor }}
      run: |
        for attempt in 1 2 3 4 5; do
          printf '%s' "$DOCKER_TOKEN" \
            | docker login ghcr.io -u "$DOCKER_USER" --password-stdin \
            && exit 0
          backoff=$((attempt * 5))
          echo "docker login attempt $attempt failed; retrying in ${backoff}s" >&2
          sleep $backoff
        done
        echo "docker login failed after 5 attempts" >&2
        exit 1
    - name: Extract metadata
      uses: docker/metadata-action@v5
      id: meta
      with:
        images: ghcr.io/amrc-factoryplus/${{ inputs.service-name }}
