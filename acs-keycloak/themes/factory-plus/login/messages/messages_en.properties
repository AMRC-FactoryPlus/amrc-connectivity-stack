# ACS Keycloak login theme - English message overrides.
# Inherited messages from keycloak.v2 win for any key not listed here.
#
# backToApplication ships from upstream with a literal "&laquo;" prefix.
# FreeMarker auto-escapes ${msg(...)} so it renders as the text
# "&laquo;" rather than the « glyph. We render our own decorative arrow
# in the FTL, so strip the entity from the message itself.
backToApplication=Back to Application
