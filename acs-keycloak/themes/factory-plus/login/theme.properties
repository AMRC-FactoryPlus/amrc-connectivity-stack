#
# ACS Keycloak login theme
# Renders the realm-facing login pages in ACS branding (matches the
# acs-admin shadcn-vue look). The templates here completely replace the
# upstream layout, but we still inherit from keycloak.v2 so any FTL we
# don't override (idp link prompts, error fragments, less-common flows)
# fall back to upstream rather than 404.
#
parent=keycloak.v2
import=common/keycloak

styles=css/styles.css
