# Core auth definitions
#-EARLY
#-REQUIRE: service-urls core-apps
---
service: !u UUIDs.Service.ConfigDB
version: 2
objects:
  !u ConfigDB.Class.R2Class:
    !u Auth.Class.PrincipalGroup:
      name: "Principal group"
      iri: authn/Principal
    !u Auth.Class.PrincipalType:
      name: "Principal type"
      iri: authn/PrincipalType
      subclassOf:
        - !u Auth.Class.PrincipalGroup

    !u Auth.Class.Role:
      name: "Role"
      iri: authn/Role
      subclassOf:
        - !u Auth.Class.PrincipalGroup
    !u Auth.Class.ServiceRole:
      name: "Service role"
      iri: authn/ServiceRole
      subclassOf:
        - !u Auth.Class.Role
    !u Auth.Class.ClientRole:
      name: "Client role"
      iri: authn/ClientRole
      subclassOf:
        - !u Auth.Class.Role
    !u Auth.Class.EdgeRole:
      name: "Edge role"
      iri: authn/EdgeRole
      subclassOf:
        - !u Auth.Class.Role

  !u ConfigDB.Class.R1Class:
    !u Auth.Class.Principal:
      name: "Principal"
      iri: authn/Principal
      memberOf:
        - !u Auth.Class.PrincipalGroup

  # Other principal types are in auth.yaml
  !u Auth.Class.PrincipalType:
    !u Auth.Class.CentralService:
      name: "Central service"
      iri: authn/PrincipalType
      subclassOf:
        - !u Auth.Class.Principal

