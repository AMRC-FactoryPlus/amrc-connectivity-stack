# Special UUIDs
#-EARLY
#-REQUIRE: service-urls core-apps

service: !u UUIDs.Service.ConfigDB
version: 2
objects:
  # XXX I don't think these should be Individuals.
  !u ConfigDB.Class.R1Class:
    !u UUIDs.Class.Special:
      name: "Special UUIDs"
      iri: core/Special

  !u UUIDs.Class.Special:
