      name: "Wildcard"
      iri: core/Wildcard
    !u UUIDs.Special.FactoryPlus:
      name: "Factory+"
      iri: core/FactoryPlus
    !u UUIDs.Special.Self:
      name: "Self"
      iri: core/Self
    !u UUIDs.Special.Mine:
      name: "Mine"
      iri: core/Mine
