{{ if .Values.grafana.enabled }}
{{- if not (lookup "v1" "Secret" .Release.Namespace "grafana-admin-user") }}

apiVersion: v1
kind: Secret
metadata:
  name: "grafana-admin-user"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
data:
  # Default Grafana admin login. Must NOT match any F+ OAuth login -
  # federated users arrive with preferred_username = their kerberos
  # UPN (e.g. admin@FACTORYPLUS.LOCAL), and Grafana refuses OAuth
  # login with "user already exists" if a local user has the same
  # name. Keep this as the bare "admin" default so it never collides;
  # the F+ admin principal still gets Grafana Admin via the
  # fp_permissions claim mapping, so this local account is just a
  # break-glass credential.
  admin-user: {{ "admin" | b64enc | quote }}
  # Generated once on first install. The Secret has resource-policy:
  # keep, and the surrounding "if not lookup" guard above preserves
  # the value across helm upgrades. Empty here would have made Grafana
  # fall back to its built-in default of "admin", which is unacceptable
  # on any cluster reachable from outside the operator's terminal.
  admin-password: {{ randAlphaNum 32 | b64enc | quote }}

{{- end }}
{{- end -}}
