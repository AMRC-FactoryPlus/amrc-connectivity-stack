{{- if .Values.i3x.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: i3x
  namespace: {{ .Release.Namespace }}
  labels:
    component: i3x
spec:
  replicas: 1
  selector:
    matchLabels:
      component: i3x
  template:
    metadata:
      labels:
        component: i3x
        factory-plus.service: i3x
    spec:
      {{- with .Values.acs.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: krb5-conf
          configMap:
            name: krb5-conf
        - name: keytabs
          secret:
            secretName: i3x-keytabs

      containers:
        - name: i3x
{{ include "amrc-connectivity-stack.image" (list . .Values.i3x) | indent 10 }}
          command: [ "/usr/bin/k5start", "-Uf", "/keytabs/client" ]
          args: [ "node", "--es-module-specifier-resolution=node", "bin/api.js" ]
          env:
            - name: KRB5_CONFIG
              value: /config/krb5-conf/krb5.conf
            - name: CLIENT_KEYTAB
              value: /keytabs/client
            - name: SERVER_KEYTAB
              value: /keytabs/server
            - name: HOSTNAME
              value: i3x.{{ .Release.Namespace }}.svc.cluster.local
            - name: REALM
              value: {{ .Values.identity.realm | required "values.identity.realm is required!" }}
            - name: SPARKPLUG_ADDRESS
              value: {{ .Values.acs.organisation | required "values.acs.organisation is required!" }}-Service-Core/i3X
            - name: DEVICE_UUID
              value: 16f85dd1-35f9-4bfc-9e08-4ce3b1e3b54e
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: {{ .Values.i3x.logLevel | default "info" | quote }}
            - name: DIRECTORY_URL
              value: http://directory.{{ .Release.Namespace }}.svc.cluster.local
            - name: INFLUX_URL
              value: http://acs-influxdb2.{{ .Release.Namespace }}.svc.cluster.local
            - name: INFLUX_ORG
              value: default
            - name: INFLUX_BUCKET
              value: default
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-auth
                  key: admin-token
            - name: I3X_NAMESPACE_NAME
              value: {{ .Values.acs.organisation | required "values.acs.organisation is required!" }}
            - name: I3X_NAMESPACE_URI
              value: {{ .Values.i3x.namespaceUri | default (printf "https://%s/i3x" .Values.acs.baseUrl) | quote }}
            - name: I3X_POLL_INTERVAL
              value: "60000"
            - name: I3X_SUBSCRIPTION_TTL
              value: "300000"
            - name: I3X_STALE_THRESHOLD
              value: "300000"
          volumeMounts:
            - mountPath: /config/krb5-conf
              name: krb5-conf
            - mountPath: /keytabs
              name: keytabs
---
apiVersion: v1
kind: Service
metadata:
  name: i3x
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "web"
      port: 80
      targetPort: 8080
  selector:
    factory-plus.service: i3x
{{- end -}}
