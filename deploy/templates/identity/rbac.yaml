{{ if .Values.identity.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krb-keys-operator
  namespace: {{ .Release.Namespace }}
---
# This role is for the krb-keys operator itself. It grants access to create the actual
# secrets and sealed secrets, and access to read configmaps to find the kubeseal cert.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: krb-keys-operator
rules:
  -   apiGroups: [factoryplus.app.amrc.co.uk]
      resources: [kerberos-keys]
      verbs: [list, get, watch, patch]
  -   apiGroups: [factoryplus.app.amrc.co.uk]
      resources: [kerberos-keys/status]
      verbs: [list, get, create, update, delete, watch, patch]
  # LocalSecret resources arrived with the openid/keycloak templates
  # (deploy/templates/openid/local-secrets.yaml). The operator generates
  # random passwords for them and stores the result in the referenced
  # Secret (e.g. keycloak-clients). Without these verbs the operator
  # logs an APIForbiddenError on startup, never sees the LocalSecrets,
  # never creates the Secret, and the openid + service-setup pods can't
  # mount it.
  -   apiGroups: [factoryplus.app.amrc.co.uk]
      resources: [localsecrets]
      verbs: [list, get, watch, patch]
  -   apiGroups: [factoryplus.app.amrc.co.uk]
      resources: [localsecrets/status]
      verbs: [list, get, create, update, delete, watch, patch]
  -   apiGroups: [""]
      resources: [secrets]
      verbs: [get, create, update, delete, patch]
  -   apiGroups: [bitnami.com]
      resources: [sealedsecrets]
      verbs: [get, create, update, delete, patch]
  -   apiGroups: [""]
      resources: [configmaps]
      verbs: [get]
  # kopf (the python operator framework) lists CRDs at startup to map
  # its registered handlers to API resources, and watches namespaces.
  # Without these the operator logs noisy 403s but more importantly
  # may not establish all of its watches reliably.
  -   apiGroups: [apiextensions.k8s.io]
      resources: [customresourcedefinitions]
      verbs: [list, get, watch]
  -   apiGroups: [""]
      resources: [namespaces]
      verbs: [get, list, watch]
  -   apiGroups: [""]
      resources: [events]
      verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: krb-keys-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: krb-keys-operator
subjects:
  -   kind: ServiceAccount
      name: krb-keys-operator
      namespace: {{ .Release.Namespace }}
{{- end -}}