{{ if .Values.identity.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krb-keys-operator
  namespace: {{ .Release.Namespace }}
---
# This role is for the krb-keys operator itself. It grants access to create the actual
# secrets and sealed secrets, and access to read configmaps to find the kubeseal cert.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: krb-keys-operator
rules:
  # localsecrets is included because the operator registers a
  # LocalSecret handler unconditionally, and the CRD arrives on the
  # central cluster as soon as the first edge cluster is provisioned
  # (it ships in the edge-cluster chart's crds/). Without this rule
  # kopf's watch crash-loops with a 403 from that point on. The edge
  # chart (edge-cluster/templates/krb-keys.yaml) already grants the
  # same set.
  -   apiGroups: [factoryplus.app.amrc.co.uk]
      resources: [kerberos-keys, localsecrets]
      verbs: [list, get, watch, patch]
  -   apiGroups: [factoryplus.app.amrc.co.uk]
      resources: [kerberos-keys/status, localsecrets/status]
      verbs: [list, get, create, update, delete, watch, patch]
  -   apiGroups: [""]
      resources: [secrets]
      verbs: [get, create, update, delete, patch]
  -   apiGroups: [bitnami.com]
      resources: [sealedsecrets]
      verbs: [get, create, update, delete, patch]
  -   apiGroups: [""]
      resources: [configmaps]
      verbs: [get]
  # kopf (the python operator framework) lists CRDs at startup to map
  # its registered handlers to API resources, and watches namespaces.
  # Without these the operator logs noisy 403s but more importantly
  # may not establish all of its watches reliably.
  -   apiGroups: [apiextensions.k8s.io]
      resources: [customresourcedefinitions]
      verbs: [list, get, watch]
  -   apiGroups: [""]
      resources: [namespaces]
      verbs: [get, list, watch]
  -   apiGroups: [""]
      resources: [events]
      verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: krb-keys-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: krb-keys-operator
subjects:
  -   kind: ServiceAccount
      name: krb-keys-operator
      namespace: {{ .Release.Namespace }}
{{- end -}}