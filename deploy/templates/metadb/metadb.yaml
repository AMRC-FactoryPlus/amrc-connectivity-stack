{{- if .Values.metadb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadb
  namespace: {{ .Release.Namespace }}
  labels:
    component: metadb
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      component: metadb
  template:
    metadata:
      labels:
        component: metadb
        factory-plus.service: metadb
    spec:
      {{- with .Values.acs.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: krb5-conf
          configMap:
            name: krb5-conf
        - name: keytabs
          secret:
            secretName: metadb-keytabs
        - name: data
          persistentVolumeClaim:
            claimName: metadb-storage

      initContainers:
        # Do as little work as possible as root... We need to chown the storage
        # as the default permissions will not be correct.
        - name: chown-storage
{{ include "amrc-connectivity-stack.image" (list . .Values.shell) | indent 10 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Setting repo dir permissions"
              chown 1000:1000 /data
              chmod 700 /data
              ls -ld /data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - mountPath: /data
              name: data

      containers:
        - name: metadb
{{ include "amrc-connectivity-stack.image" (list . .Values.metadb) | indent 10 }}
          # For now we let Java access the client keytab directly
          #command: [ "/usr/bin/k5start", "-Uf", "/keytabs/client" ]
          args: ["java", "-jar", "/home/app/acs-metadb.jar"]
          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: /data
            - name: CLIENT_KEYTAB
              value: /keytabs/client
            - name: CLIENT_PRINCIPAL
              value: sv1metadb@{{ .Values.identity.realm }}
            - name: SERVER_KEYTAB
              value: /keytabs/server
            # This needs to name a principal available in the keytab, used for verifying passwords.
            - name: SERVER_PRINCIPAL
              value: HTTP/metadb.{{ .Release.Namespace }}.svc.cluster.local
            - name: DIRECTORY_URL
              value: http://directory.{{ .Release.Namespace }}.svc.cluster.local
            - name: VERBOSE
              value: {{.Values.metadb.verbosity | quote | required "values.metadb.verbosity is required!"}}
          volumeMounts:
            - mountPath: /etc/krb5.conf
              name: krb5-conf
              subPath: krb5.conf
            - mountPath: /keytabs
              name: keytabs
            - mountPath: /data
              name: data
---
apiVersion: v1
kind: Service
metadata:
  name: metadb
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
  selector:
    factory-plus.service: metadb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metadb-storage
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    component: metadb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
{{- end -}}
