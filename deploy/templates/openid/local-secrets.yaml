{{- if .Values.openid.enabled }}
# All Keycloak credentials are stored in a single keycloak-clients
# Secret. The krb-keys-operator generates a random password for each
# LocalSecret/key pair and persists it across reconciles.

# Initial Keycloak admin (KEYCLOAK_ADMIN/KEYCLOAK_ADMIN_PASSWORD env)
apiVersion: factoryplus.app.amrc.co.uk/v1
kind: LocalSecret
metadata:
  name: keycloak-admin-bootstrap
  namespace: {{ .Release.Namespace }}
spec:
  format: Password
  secret: keycloak-clients
  key: _bootstrap
---
# Secret for the realm's admin-cli confidential client used by
# service-setup for client_credentials grants.
apiVersion: factoryplus.app.amrc.co.uk/v1
kind: LocalSecret
metadata:
  name: keycloak-admin-admin
  namespace: {{ .Release.Namespace }}
spec:
  format: Password
  secret: keycloak-clients
  key: _admin
{{- range $name, $client := .Values.serviceSetup.config.openidClients }}
{{- if and $client.enabled (not $client.builtin) }}
---
apiVersion: factoryplus.app.amrc.co.uk/v1
kind: LocalSecret
metadata:
  name: keycloak-client-{{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  format: Password
  secret: keycloak-clients
  key: {{ $name | quote }}
{{- end }}
{{- end }}
{{- end }}
