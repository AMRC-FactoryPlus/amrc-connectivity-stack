acs:
  # -- The organisation where ACS is being deployed
  organisation: AMRC
  # -- The base URL that services will be served from
  baseUrl: factoryplus.myorganisation.com
  # -- Whether or not services should be served over HTTPS
  secure: true
  letsEncrypt:
    # -- Whether or not to use Let's Encrypt to automatically generate
    # certificates for the services
    enabled: false
    # -- The email address to use for Let's Encrypt
    email: ''
    # -- Whether or not to use the staging environment for Let's Encrypt
    staging: false
    # -- A list of additional DNS names to use for the certificate
    additionalDnsNames: []
  # -- The name of the secret holding the wildcard certificate for the
  # above domain. It will be used for every service unless that service
  # specifies its own tlsSecretName.
  tlsSecretName: factoryplus-tls
  cacheMaxAge: 300
  # -- Image pull secrets for container images
  imagePullSecrets: []
  # The default registry for ACS images. This can be overridden for
  # individual images if necessary.
  defaultRegistry: ghcr.io/amrc-factoryplus
  # -- An optional tag that will force images to use this version
  # regardless of the version in the Helm chart. Each component can
  # further override this value by setting the `tag` property in its
  # own section. Deployments from a Git checkout must set this value.
  #defaultTag: ''
  # The default pullPolicy.
  defaultPullPolicy: IfNotPresent

  # -- Configure which schemas are loaded into the ConfigDB
  schemas:
    load: true
    image:
      registry: ghcr.io
      repository: amrc-factoryplus/acs-schemas
      tag: v1.5.1

coredns:
  # -- An option to enable the redirecting of external URL's back
  # to the internal Traefik service. This is done through a config map
  # override to coredns in the kube-system namespace. The override rewrites
  # queries matching .*.<baseURL> to acs-traefik.<namespace>.svc.cluster.local,
  # ensuring correct internal service resolution. ACS deployments without
  # external DNS should enable this.
  traefikRedirect:
    enabled: false

coreDNS:
  # -- An option to enable the redirecting of external URL's back
  # to the internal Traefik service. This is done through a config map
  # override to coredns in the kube-system namespace. The override rewrites
  # queries matching .*.<baseURL> to acs-traefik.<namespace>.svc.cluster.local,
  # ensuring correct internal service resolution. ACS deployments without
  # external DNS should enable this.
  traefikRedirect:
    enabled: false

identity:
  # -- Whether or not to enable the Identity component
  enabled: true
  # -- The Kerberos realm for this Factory+ deployment.
  realm: FACTORYPLUS.MYORGANISATION.COM
  # -- Kerberos UPNs to grant kadmin access. This needs to be list of
  # objects with 'principal', 'permission' and (optionally)
  # 'restrictions' properties; see the kadmin documentation for their
  # meaning.
  kadminUsers: []
  # -- Enable support for cross-realm authentication
  crossRealm: [ ]
  # crossRealm:
  #   - realm: MYOTHERREALM.COM
  #     domain: myotherrealm.com
  #     otherDomains:
  #       - myotherrealm.org
  #       - myotherrealm.net
  identity:
    image:
      # -- The repository of the Identity component
      repository: acs-identity
    # If this is set to true, the kdb-init container will not set up the
    # KDB but will sit and wait. This can be used to halt startup of the
    # KDC until a restore from backup can be performed. Be aware that
    # this will halt startup of the KDC every time the pod starts until
    # the setting is changed.
    manualInit: false
  krbKeysOperator:
    # -- A comma-separated list of namespaces that the KerberosKey Operator should watch for KerberosKey resources in. Defaults to the release namespace if not specified
    namespaces: ""

    image:
      # -- The repository of the KerberosKey Operator
      repository: acs-krb-keys-operator

auth:
  # -- Whether or not to enable the Authorisation component
  enabled: true
  image:
    # -- The repository of the Authorisation component
    repository: acs-auth
  verbosity: "ALL,!service,!token,!query"

directory:
  # -- Whether or not to enable the Directory component
  enabled: true
  image:
    # -- The repository of the Directory component
    repository: acs-directory

configdb:
  # -- Whether or not to enable the Configuration Store component
  enabled: true
  image:
    # -- The repository of the Configuration Store component
    repository: acs-configdb
  bodyLimit: 100kb
  backup:
    # -- Whether to run a pg_dump of the ConfigDB before every helm upgrade
    enabled: true
    # -- Number of backups to retain
    retention: 5
    # -- Size of the PVC for storing backups
    storageSize: 1Gi

metadb:
  enabled: false
  asConfigDB: false
  image:
    repository: acs-metadb

files:
  enabled: true
  image:
    repository: acs-files
  bodyLimit: 500kb
  storage: 20Gi

monitor:
  enabled: true
  image:
    repository: acs-monitor
  verbosity: "ALL,!service,!token"

dataAccess:
  enabled: true
  image:
    repository: acs-data-access
  verbosity: "ALL,!service,!token"

openid:
  # -- Whether or not to deploy the Keycloak OIDC server
  enabled: true
  # -- Realm name created in Keycloak. Must match the realm used in
  # the Grafana OAuth ConfigMap (deploy/templates/grafana/grafana-ini.yaml).
  realm: factory_plus
  # -- Keycloak login theme set on the realm. The "factory-plus" theme
  # ships in the acs-keycloak image and renders ACS-branded login,
  # logout and error pages. Set to "" (empty) to keep Keycloak's stock
  # keycloak.v2 theme, or set to a different name if you've baked a
  # custom theme into your own Keycloak image.
  loginTheme: factory-plus
  image:
    # -- Custom Keycloak image with the Factory+ User Storage SPI baked
    # in (built from acs-keycloak/Dockerfile). To run upstream Keycloak
    # without the SPI, override repository to "keycloak/keycloak" and
    # registry to "quay.io" - but the SPI federation provider won't load.
    repository: acs-keycloak
  # tlsSecretName: <override>   # optional, falls back to acs.tlsSecretName

# -- The service-setup component loads ACS-specific configuration into
# the ACS services when the Helm chart is deployed or upgraded.
serviceSetup:
  enabled: true
  image:
    repository: acs-service-setup
  # This section overrides the classes etc. installed into the ConfigDB
  config:
    # Git repos to create in the on-prem server. These may be
    # automatically mirrored from external repos, or populated by the
    # service setup job.
    repoMirror:
      helm:
        name: Edge Helm charts
        pull: {}
    # Helm charts to deploy to the edge; these default to the charts
    # created automatically but can be overridden to customise
    helmChart:
      # Chart to deploy an edge cluster
      #cluster: null
    # Stable UUIDs for the Grafana role groups in F+. These groups are
    # created by service-setup (see lib/grafana-groups.js) as subclasses
    # of Class.Principal. To grant a user a Grafana role, an admin adds
    # their principal to one of these groups via the F+ ACL editor;
    # the SPI's fp_groups claim picks this up on next login (within
    # cache TTL) and Grafana's role_attribute_path translates it to
    # the matching Grafana role.
    #
    # Customise per deployment if needed, but DO NOT change once a
    # production cluster has grants attached - the UUIDs are referenced
    # by the F+ ACL data which doesn't migrate when UUIDs change.
    grafanaPermissions:
      admin:  "7b553965-0987-4ffb-bf9a-afac8bc13707"
      editor: "e5f9fe18-da63-49d3-bee5-7950eeb3e053"

    # OIDC clients to provision in Keycloak. Each entry generates a
    # LocalSecret holding the client_secret in keycloak-clients/<key>.
    # Every client automatically gets the fp_principal_uuid and
    # fp_groups protocol mappers attached - JWT consumers read F+
    # identity directly from the token. Per-client Keycloak roles are
    # no longer used; permissions are driven from F+ ACLs via
    # fp_groups.
    #
    # By default the client's URLs are derived from the entry name and
    # acs.baseUrl: rootUrl/baseUrl/webOrigins all become
    # `<proto>://<name>.<acs.baseUrl>`, redirectUris becomes
    # `<root><redirectPath>`, and post.logout.redirect.uris becomes
    # `<root>`. For applications served at a different host, override
    # any of the following per-client fields - the values flow
    # straight through to Keycloak and replace the auto-derived
    # defaults so removals also work:
    #   rootUrl                 (string)
    #   baseUrl                 (string)
    #   redirectUris            (list of full URLs)
    #   webOrigins              (list of origins)
    #   postLogoutRedirectUris  (list of full URLs)
    openidClients:
      grafana:
        enabled: true
        name: Grafana
        redirectPath: /login/generic_oauth
      # Postman / curl / scripted-API client. Public (no client secret)
      # so it can be configured directly in Postman without keeping a
      # secret out of source control; PKCE S256 is enforced by
      # service-setup so the grant is still secure. Authorization Code
      # is for human users (Postman opens a browser to log in). Device
      # Authorization (RFC 8628) is for headless CLIs. ROPC stays off:
      # it's deprecated in OAuth 2.1 and unnecessary.
      acs-cli:
        enabled: true
        name: ACS CLI
        publicClient: true
        standardFlowEnabled: true
        deviceAuthorizationFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - https://oauth.pstmn.io/v1/callback
          - http://localhost/*
          - http://127.0.0.1/*
        webOrigins:
          - https://oauth.pstmn.io
        postLogoutRedirectUris:
          - https://oauth.pstmn.io/v1/callback

edgeHelm:
  enabled: true
  image:
    repository: edge-helm-charts
  repoPath: shared/helm

mqtt:
  # -- Whether or not to enable the MQTT component
  enabled: true
  image:
    # -- The repository of the MQTT component
    repository: acs-mqtt
  # -- Possible values are either 1 to enable all possible debugging, or a comma-separated list of debug tags (the tags printed before the log lines). No logging is specified as an empty string.
  verbosity: 0

unsIngesters:
  sparkplug:
    enabled: true
    image:
      # -- The repository of the MQTT component
      repository: uns-ingester-sparkplug
    # -- The minimum log level that the historian will log messages at (One of 'fatal', 'error', 'warn', 'info', 'debug', 'trace' or 'silent'.)
    logLevel: info
    verbosity: 0

visualiser:
  enabled: true
  image:
    # -- The repository of the MQTT component
    repository: acs-visualiser

cmdesc:
  # -- Whether or not to enable the Commands component
  enabled: true
  image:
    # -- The repository of the Commands component
    repository: acs-cmdesc
  # -- Possible values are either 1 to enable all possible debugging, or a comma-separated list of debug tags (the tags printed before the log lines). No logging is specified as an empty string.
  verbosity: 1

historians:
  uns:
    enabled: false
    # -- The minimum log level that the historian will log messages at (One of 'fatal', 'error', 'warn', 'info', 'debug', 'trace' or 'silent'.)
    logLevel: info
    # -- The number of messages to batch together before sending to InfluxDB
    batchSize: 5000
    # -- Send all buffered messages after this amount of time has elapsed if the buffer is not full (in milliseconds)
    flushInterval: 10000
    image:
      # -- The repository of the UNS Historian component
      repository: historian-uns
  sparkplug:
    enabled: true
    # -- The minimum log level that the historian will log messages at (One of 'fatal', 'error', 'warn', 'info', 'debug', 'trace' or 'silent'.)
    logLevel: info
    # -- The number of messages to batch together before sending to InfluxDB
    batchSize: 5000
    # -- Send all buffered messages after this amount of time has elapsed if the buffer is not full (in milliseconds)
    flushInterval: 10000
    image:
      # -- The repository of the Warehouse component
      repository: historian-sparkplug
git:
  # -- Whether or not to enable the Git component
  enabled: true
  image:
    # -- The repository of the Git component
    repository: acs-git
  # -- Possible values are either 1 to enable all possible debugging, or a comma-separated list of debug tags (the tags printed before the log lines). No logging is specified as an empty string.
  verbosity: "ALL,!service,!token"

clusterManager:
  # -- Whether or not to enable the Cluster Manager component
  enabled: true
  image:
    # -- The repository of the Clusters component
    repository: acs-cluster-manager
  verbosity: "ALL,!service,!token"

i3x:
  # -- Whether or not to enable the i3X service
  enabled: true
  image:
    # -- The repository of the i3X service
    repository: acs-i3x
  # -- The minimum log level for the i3X service
  logLevel: info
  # -- Override the i3X namespace URI (defaults to https://<baseUrl>/i3x)
  # namespaceUri: https://example.com/i3x

admin:
  # -- Whether or not to enable the Admin component
  enabled: true
  image:
    # -- The repository of the Admin component
    repository: acs-admin

shell:
  image:
    repository: acs-krb-utils

# XXX This should probably be included in acs-krb-utils
curl: 
  image:
    registry: docker.io
    repository: appropriate/curl
    tag: latest

kubectl:
  image:
    registry: docker.io
    repository: alpine/kubectl
    tag: 1.33.4

postgres:
  # -- Whether or not to enable Postgres
  enabled: true
  # Postgres image to use. DO NOT change major version on an
  # existing installation without being prepared to handle database
  # dump/restore manually.
  image:
    registry: docker.io/library
    repository: postgres
    tag: 16.1
    # Kubegres doesn't support setting pullPolicy

kubegres:
  kubeProxy:
    image:
      registry: registry.k8s.io
      repository: kubebuilder/kube-rbac-proxy
      tag: v0.13.0
  kubegres:
    image:
      registry: docker.io
      repository: reactivetechio/kubegres
      tag: 1.16

traefik:
  enabled: true
  ports:
    mqtt:
      port: 1883
      expose: false
      exposedPort: 1883
      protocol: TCP
    mqttsecure:
      port: 8883
      expose: true
      exposedPort: 8883
      protocol: TCP
    kdc:
      port: 8888
      expose: true
      exposedPort: 88
      protocol: TCP
    kpasswd:
      port: 8464
      expose: true
      exposedPort: 464
      protocol: TCP
    kadmin:
      port: 8749
      expose: true
      exposedPort: 749
      protocol: TCP
  additionalArguments:
    - --metrics.prometheus=true
    - --serverstransport.insecureskipverify=true
  ingressRoute:
    dashboard:
      enabled: false
#   -- [AZURE] Enable the below section to expose your instance of Factory+/ACS over the internet, replacing the <Value>
#   -- tags with the details of your pre-configured load balancer.
    service:
      spec:
        loadBalancerIP: <External IP address here>
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-resource-group: <Load Balancer Resource Group here>
  providers:
    kubernetesCRD:
      allowCrossNamespace: true
  logs:
    general:
      level: DEBUG

grafana:
  deploymentStrategy:
    type: Recreate
  image:
    tag: 10.0.1
  enabled: true
  persistence:
    enabled: true
    annotations:
      "helm.sh/resource-policy": "keep"
  envFromSecret: influxdb-auth
  admin:
    existingSecret: grafana-admin-user
  grafana.ini:
    server:
      root_url: "$__file{/etc/acs-config/root_url}"
    auth:
      # Hide the local username/password form: F+ via Keycloak is the
      # only intended login path. The default Grafana admin (seed in
      # Secret grafana-admin-user) is reachable via the URL
      # /login?disableLoginForm=false for emergency access if Keycloak
      # is unreachable.
      #
      # Operators that want the form back can override with:
      #   grafana:
      #     grafana.ini:
      #       auth:
      #         disable_login_form: false
      disable_login_form: true
      oauth_auto_login: false
    auth.basic:
      enabled: false
    auth.generic_oauth:
      enabled: true
      name: "Factory+"
      allow_sign_up: true
      client_id: grafana
      client_secret: $__file{/etc/secrets/auth_generic_oauth/grafana}
      scopes: openid profile email
      # F+ has no email field; the kerberos UPN (delivered as the
      # `preferred_username` claim by Keycloak) is the closest thing.
      # Pointing email_attribute_path at it stops Grafana falling back
      # to the GitHub-style /emails endpoint (which Keycloak doesn't
      # expose and which 404s).
      email_attribute_path: preferred_username
      auth_url: $__file{/etc/acs-config/auth_url}
      token_url: $__file{/etc/acs-config/token_url}
      api_url: $__file{/etc/acs-config/api_url}
      signout_redirect_url: $__file{/etc/acs-config/signout_redirect_url}
      # role_attribute_path is templated into the acs-grafana-config
      # ConfigMap by deploy/templates/grafana/grafana-ini.yaml so the
      # F+ permission UUIDs from serviceSetup.config.grafanaPermissions
      # can be interpolated. Reading via $__file picks up the rendered
      # value.
      role_attribute_path: $__file{/etc/acs-config/role_attribute_path}
      # Grafana applies role_attribute_path on every OAuth login. By
      # default it will not *demote* an existing user; with strict
      # mode the JMESPath result is authoritative each login, so
      # revoking Grafana.Perm.* in F+ downgrades on next login rather
      # than letting the 60s SPI cache staleness become permanent.
      role_attribute_strict: true
      # Required for OAuth to be able to claim an existing Grafana
      # user at all - without this flag, pkg/services/authn/clients/
      # oauth.go leaves lookupParams.Email AND lookupParams.Login
      # both nil, so lookupByOneOf finds nothing, Grafana drops into
      # createUser, and the create collides with the existing row's
      # email/login uniqueness check ("user already exists"). The
      # "insecure" wording refers to providers that don't verify
      # emails - ours is our own Keycloak federating F+ Auth, and
      # the FactoryPlusUserAdapter already stamps email_verified=true
      # because the email is derived from a kerberos-authoritative
      # F+ Principal record.
      oauth_allow_insecure_email_lookup: true
  extraConfigmapMounts:
    - name: acs-grafana-config
      mountPath: /etc/acs-config
      configMap: acs-grafana-config
      readOnly: true
      # The grafana subchart (6.52.4) calls `tpl` on `.subPath` and
      # errors when the field is missing rather than honouring its
      # `default ""` fallback. Empty string keeps the mount un-subpath'd.
      subPath: ""
  extraSecretMounts:
    - name: keycloak-client-grafana
      secretName: keycloak-clients
      defaultMode: 0440
      mountPath: /etc/secrets/auth_generic_oauth
      readOnly: true
      items:
        - key: grafana
          path: grafana
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
      initDatasources: true
    dashboards:
      enabled: true
      provider:
        folder: 'Factory+'
        disableDelete: true
      searchNamespace: ALL

influxdb2:
  enabled: true
  adminUser:
    organization: default
    existingSecret: influxdb-auth
  initScripts:
    enabled: true
    scripts:
      init.sh: |+
        #!/bin/bash
        echo "Creating mapping for bucket ${DOCKER_INFLUXDB_INIT_BUCKET_ID} in org ${DOCKER_INFLUXDB_INIT_ORG}"
        influx v1 dbrp create --bucket-id ${DOCKER_INFLUXDB_INIT_BUCKET_ID} --db default --rp default --default --org ${DOCKER_INFLUXDB_INIT_ORG}
  pdb:
    create: false

cert-manager:
  fullnameOverride: "cert-manager"
