$kind: http-request
name: get ACL (?principal=)
url: '{{scheme}}://auth.{{domain}}/authz/acl'
method: GET
queryParams:
  principal: user@REALM
  permission: <uuid>
order: 1000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200]);'
    - '});'
