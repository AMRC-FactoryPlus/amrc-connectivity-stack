$kind: http-request
name: get ACL (?principal=)
url: '{{scheme}}://auth.{{domain}}/authz/acl'
method: GET
queryParams:
  principal: user@REALM
  permission: <uuid>
order: 1000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('No 5xx server error', function () {
    - '    pm.expect(pm.response.code).to.be.below(500);'
    - '});'
    - pm.test('Auth succeeded', function () {
    - '    pm.expect(pm.response.code).to.not.equal(401);'
    - '});'
