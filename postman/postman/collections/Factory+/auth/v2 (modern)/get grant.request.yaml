$kind: http-request
url: '{{scheme}}://auth.{{domain}}/v2/grant/{{grantUuid}}'
method: GET
order: 16000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 (or 404 if upstream list empty)', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
    - pm.test('Got a real grantUuid from upstream list', function () {
    - '    pm.expect(pm.collectionVariables.get(''grantUuid''),'
    - '        ''no grantUuid - check the upstream list endpoint'').to.not.be.empty;'
    - '});'
