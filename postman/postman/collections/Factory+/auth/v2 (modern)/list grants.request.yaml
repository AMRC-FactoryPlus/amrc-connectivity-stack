$kind: http-request
url: '{{scheme}}://auth.{{domain}}/v2/grant'
method: GET
order: 14000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200', function () {
    - '    pm.expect(pm.response.code).to.equal(200);'
    - '});'
    - let body = null; try { body = pm.response.json(); } catch (e) {}
    - 'const v = Array.isArray(body) ? (body[0]?.uuid || body[0]) : null;'
    - if (v) pm.collectionVariables.set('grantUuid', v);
