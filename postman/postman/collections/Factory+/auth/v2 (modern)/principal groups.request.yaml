$kind: http-request
description: Recursive group membership for a principal (used by the SPI for the fp_groups claim).
url: '{{scheme}}://auth.{{domain}}/v2/principal/:uuid/groups'
method: GET
order: 5000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 / 404', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
