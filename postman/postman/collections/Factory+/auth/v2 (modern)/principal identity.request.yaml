$kind: http-request
description: Identity record of a given kind (kerberos, sparkplug, etc.) for a principal.
url: '{{scheme}}://auth.{{domain}}/v2/principal/:uuid/:kind'
method: GET
order: 6000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('No 5xx server error', function () {
    - '    pm.expect(pm.response.code).to.be.below(500);'
    - '});'
    - pm.test('Auth succeeded', function () {
    - '    pm.expect(pm.response.code).to.not.equal(401);'
    - '});'
