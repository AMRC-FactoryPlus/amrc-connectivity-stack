$kind: http-request
description: Identity record of a given kind (kerberos, sparkplug, etc.) for a principal.
url: '{{scheme}}://auth.{{domain}}/v2/principal/:uuid/:kind'
method: GET
order: 6000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 / 404', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
