$kind: http-request
description: Returns the full identity record for the calling principal. With a Keycloak JWT, fp_principal_uuid is used to
  look up the record.
url: '{{scheme}}://auth.{{domain}}/v2/whoami'
method: GET
order: 1000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('No 5xx server error', function () {
    - '    pm.expect(pm.response.code).to.be.below(500);'
    - '});'
    - pm.test('Auth succeeded', function () {
    - '    pm.expect(pm.response.code).to.not.equal(401);'
    - '});'
