$kind: http-request
description: Returns the bootstrap manifest to apply to a new edge cluster.
url: '{{scheme}}://clusters.{{domain}}/v1/cluster/:cluster/bootstrap'
method: GET
order: 2000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 / 404', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
