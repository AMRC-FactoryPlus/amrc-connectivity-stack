$kind: http-request
url: '{{scheme}}://configdb.{{domain}}/v1/app/:app/class/:class/search'
method: GET
queryParams:
  '@group': group_id
order: 2000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('No 5xx server error', function () {
    - '    pm.expect(pm.response.code).to.be.below(500);'
    - '});'
    - pm.test('Auth succeeded', function () {
    - '    pm.expect(pm.response.code).to.not.equal(401);'
    - '});'
