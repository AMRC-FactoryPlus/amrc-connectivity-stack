$kind: http-request
url: '{{scheme}}://configdb.{{domain}}/v1/app/:app/class/:class/search'
method: GET
queryParams:
  '@group': group_id
order: 2000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 / 404', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
