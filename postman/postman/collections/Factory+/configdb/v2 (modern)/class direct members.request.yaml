$kind: http-request
description: Direct members only.
url: '{{scheme}}://configdb.{{domain}}/v2/class/:class/direct/member'
method: GET
order: 9000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('No 5xx server error', function () {
    - '    pm.expect(pm.response.code).to.be.below(500);'
    - '});'
    - pm.test('Auth succeeded', function () {
    - '    pm.expect(pm.response.code).to.not.equal(401);'
    - '});'
