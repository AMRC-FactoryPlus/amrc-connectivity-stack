$kind: http-request
description: All effective subclasses (transitive).
url: '{{scheme}}://configdb.{{domain}}/v2/class/{{classUuid}}/subclass'
method: GET
order: 12000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 (or 404 if upstream list empty)', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
    - pm.test('Got a real classUuid from upstream list', function () {
    - '    pm.expect(pm.collectionVariables.get(''classUuid''),'
    - '        ''no classUuid - check the upstream list endpoint'').to.not.be.empty;'
    - '});'
