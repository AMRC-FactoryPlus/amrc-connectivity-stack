$kind: http-request
url: '{{scheme}}://configdb.{{domain}}/v2/app/{{appUuid}}/object'
method: GET
order: 16000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 (or 404 if upstream list empty)', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
    - pm.test('Got a real appUuid from upstream list', function () {
    - '    pm.expect(pm.collectionVariables.get(''appUuid''),'
    - '        ''no appUuid - check the upstream list endpoint'').to.not.be.empty;'
    - '});'
