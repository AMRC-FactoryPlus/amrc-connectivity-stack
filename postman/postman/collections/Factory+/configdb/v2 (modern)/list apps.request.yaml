$kind: http-request
description: Members of Class.App. Compat shim that forwards to /v2/class/<App>/member.
url: '{{scheme}}://configdb.{{domain}}/v2/app'
method: GET
order: 5000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200]);'
    - '});'
