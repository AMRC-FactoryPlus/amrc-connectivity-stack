$kind: http-request
url: '{{scheme}}://directory.{{domain}}/v1/alert/{{alertUuid}}'
method: GET
order: 5000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 (or 404 if upstream list empty)', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
    - pm.test('Got a real alertUuid from upstream list', function () {
    - '    pm.expect(pm.collectionVariables.get(''alertUuid''),'
    - '        ''no alertUuid - check the upstream list endpoint'').to.not.be.empty;'
    - '});'
