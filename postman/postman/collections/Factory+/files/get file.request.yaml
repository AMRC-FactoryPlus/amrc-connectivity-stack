$kind: http-request
url: '{{scheme}}://files.{{domain}}/v1/storage/{{fileUuid}}'
method: GET
order: 2000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 (or 404 if upstream list empty)', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
    - pm.test('Got a real fileUuid from upstream list', function () {
    - '    pm.expect(pm.collectionVariables.get(''fileUuid''),'
    - '        ''no fileUuid - check the upstream list endpoint'').to.not.be.empty;'
    - '});'
