$kind: http-request
description: Status across all repos.
url: '{{scheme}}://git.{{domain}}/v1/status'
method: GET
order: 1000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200]);'
    - '});'
