$kind: http-request
url: '{{scheme}}://i3x.{{domain}}/v1/objecttypes/{{i3xObjectTypeId}}'
method: GET
order: 3000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200 (or 404 if upstream list empty)', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200, 404]);'
    - '});'
    - pm.test('Got a real i3xObjectTypeId from upstream list', function () {
    - '    pm.expect(pm.collectionVariables.get(''i3xObjectTypeId''),'
    - '        ''no i3xObjectTypeId - check the upstream list endpoint'').to.not.be.empty;'
    - '});'
