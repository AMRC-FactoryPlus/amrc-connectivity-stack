$kind: http-request
description: i3x's public /v1/info endpoint. Returns spec version + capability flags.
url: '{{scheme}}://i3x.{{domain}}/v1/info'
method: GET
auth:
  type: noauth
order: 8000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('No 5xx server error', function () {
    - '    pm.expect(pm.response.code).to.be.below(500);'
    - '});'
    - pm.test('Auth succeeded', function () {
    - '    pm.expect(pm.response.code).to.not.equal(401);'
    - '});'
