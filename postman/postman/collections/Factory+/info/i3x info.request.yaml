$kind: http-request
description: i3x's public /v1/info endpoint. Returns spec version + capability flags.
url: '{{scheme}}://i3x.{{domain}}/v1/info'
method: GET
auth:
  type: noauth
order: 8000
events:
- listen: test
  script:
    type: text/javascript
    exec:
    - pm.test('Status is 200', function () {
    - '    pm.expect(pm.response.code).to.be.oneOf([200]);'
    - '});'
